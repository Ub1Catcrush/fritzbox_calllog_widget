AutoName: FritzBox CallLog Widget
Summary: FritzBox call log on your home screen — resizable & customisable
Description: |-
  A customisable Android home screen widget that fetches the call log from an
  AVM FRITZ!Box router and displays it as a scrollable table with date, time,
  call-type icon, and caller name or number.

  Three independent connection profiles can be configured and prioritised:
  LAN TR-064, Internet TR-064, and Internet MyFRITZ. Each profile has its own
  host, port, HTTPS setting, and can be individually enabled or disabled. The
  app tries profiles in the user-defined order with automatic fallback and
  exponential-backoff retry (2 s / 4 s / 8 s), keeping the widget reachable
  when switching between Wi-Fi and mobile data.

  The last successfully loaded call list is always shown while a background
  refresh is running. Failed refreshes appear as a subtle error strip at the
  bottom of the widget rather than replacing the list with an error screen.

  A built-in step-by-step connectivity checker runs six diagnostic steps per
  profile (DNS, TCP, HTTP, service description, authentication, call list
  download) and displays live results so any problem can be pinpointed quickly.

  Features:

  * Incoming, outgoing, and missed calls with colour-coded arrow icons
  * Tap a row to open the system dialler with the number pre-filled
  * LAN TR-064, Internet TR-064, and Internet MyFRITZ connection profiles
  * Drag-to-reorder profile priority list with per-profile enable/disable
  * MyFRITZ login with Protocol v2 (PBKDF2-SHA256), auto-fallback to v1 (MD5)
  * HTTP Digest Auth for TR-064 (RFC 2617)
  * Per-profile HTTPS with self-signed certificate acceptance
  * Cached call list always visible during background refresh
  * Failed refresh shown as subtle overlay, not a blank error screen
  * Step-by-step connectivity checker with live status per profile
  * Freely resizable widget; redraws automatically on resize
  * Manual refresh and settings buttons in the widget header
  * Configurable refresh interval and maximum entry count
  * Phone number prefix — replaces leading 0 with a country code
  * 11 independently customisable colours for light and dark mode
  * ARGB colour picker with sliders, hex input, and live swatch preview
  * Adjustable font size (8-16 sp)
  * English, German, French, and Spanish
  * Android 8.0 (API 26) and above
  * Uses RemoteCollectionItems on Android 12+ (no background service needed)
  * Open source — GPL-3.0

