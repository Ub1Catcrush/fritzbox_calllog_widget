AutoName: FritzBox CallLog Widget
Summary: FritzBox call log on your home screen — resizable & customisable
Description: |-
  A fully customisable Android home screen widget that fetches the call log
  from an AVM FRITZ!Box router and displays it as a scrollable table with
  date, time, call-type icon, and caller name or number.

  Connects via LAN TR-064, Internet TR-064, or the MyFRITZ session API.
  All three profiles are configurable independently with priority ordering,
  per-profile HTTPS, and automatic fallback with exponential-backoff retry.

  The widget always shows the last successfully loaded list while a background
  refresh runs. Failed refreshes appear as a subtle overlay, not a blank screen.

  Features:

  * Incoming, outgoing, missed calls with colour-coded icons
  * Tap a row to open the system dialler with the number pre-filled
  * LAN TR-064, Internet TR-064, and MyFRITZ connection profiles
  * MyFRITZ login supports Protocol v2 (PBKDF2-SHA256) with v1 fallback
  * Drag-to-reorder connection priority with per-profile enable/disable
  * Step-by-step connectivity checker with live status per profile
  * Cached data always shown during refresh; errors appear as subtle overlay
  * Freely resizable widget, redraws on resize
  * Manual refresh and settings buttons in the widget header
  * Configurable refresh interval and maximum entry count
  * HTTPS support with self-signed certificate acceptance
  * Phone number prefix (e.g. 0621 becomes +49621)
  * 11 customisable colours each for light and dark mode via ARGB picker
  * Adjustable font size 8-16 sp
  * English, German, French, Spanish
  * Android 8.0+ (API 26); uses RemoteCollectionItems on Android 12+

