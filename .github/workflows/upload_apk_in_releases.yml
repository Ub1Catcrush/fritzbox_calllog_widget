name: Build, Sign and Upload APK in Releases
on:
  push:
    branches:
      - 'master'
    paths:
      - 'app/**'
      - 'app/*'
      - 'gradle/**'
      - 'gradle/*'
  pull_request:
    branches:
      - 'master'
    paths:
      - 'app/**'
      - 'app/*'
      - 'gradle/**'
      - 'gradle/*'
  workflow_dispatch:

jobs:
  apk:
    name: Upload APK in Releases
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant Permission to Execute
        run: chmod +x gradlew
        
      - name: Build debug APK
        run: bash ./gradlew assemble --stacktrace
      
      - name: Upload APKs to Github Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-outputs
          path: app/build/outputs/apk/**/*.apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: release-v${{ github.run_number }}
          release_name: Automatic Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > my-release-key.jks

      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore my-release-key.jks -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            app/build/outputs/apk/release/app-release-unsigned.apk ${{ secrets.KEY_ALIAS }}

      - name: Verify signature
        run: jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Align APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release.apk
      
      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          name: Signed-APK
          path: app/build/outputs/apk/release/app-release.apk

