name: Upload APK in Releases
on:
  push:
    branches:
      - 'master'

jobs:
  apk:
    name: Upload APK in Releases
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant Permission to Execute
        run: chmod +x gradlew
        
      - name: Build debug APK
        run: bash ./gradlew assemble --stacktrace
      
      - name: Upload APKs to Github Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-outputs
          path: app/build/outputs/apk/**/*.apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: release-v${{ github.run_number }}
          release_name: Automatic Release ${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Upload Release APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/app-release-unsigned.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
