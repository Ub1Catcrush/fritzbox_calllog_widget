name: Upload APK in Releases
on:
  push:
    branches:
      - 'master'

jobs:
  apk:
    name: Upload APK in Releases
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant Permission to Execute
        run: chmod +x gradlew
        
      - name: Build debug APK
        run: bash ./gradlew assemble --stacktrace
        
      - name: Upload Debug APK to Github Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app debug
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Release APK to Github Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: newtag
          release_name: Automatic Release
          draft: false
          prerelease: false

      - name: Upload Debug APK to Release
        id: upload-release-asset-debug
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/zip
          
      - name: Upload Release APK to Release
        id: upload-release-asset-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/zip
